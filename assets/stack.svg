      <rect class="pill-bg" x="158"  y="0" rx="5" ry="5" width="118" height="30"/><text class="pill-text" x="172" y="19">Azure OpenAI</text>
      <rect class="pill-bg" x="286"  y="0" rx="5" ry="5" width="124" height="30"/><text class="pill-text" x="300" y="19">Copilot Studio</text>
      <rect class="pill-bg" x="420"  y="0" rx="5" ry="5" width="172" height="30"/><text class="pill-text" x="434" y="19">Microsoft 365 Copilot</text>
      <rect class="pill-bg" x="602"  y="0" rx="5" ry="5" width="142" height="30"/><text class="pill-text" x="616" y="19">Semantic Kernel</text>
      <rect class="pill-bg" x="754"  y="0" rx="5" ry="5" width="68"  height="30"/><text class="pill-text" x="768" y="19">Claude</text>
      <rect class="pill-bg" x="832"  y="0" rx="5" ry="5" width="96"  height="30"/><text class="pill-text" x="846" y="19">LangGraph</text>
      <rect class="pill-bg" x="938"  y="0" rx="5" ry="5" width="52"  height="30"/><text class="pill-text" x="952" y="19">MCP</text>
    </g>
  </g>

  <!-- ============ Developer Platform & DevSecOps ============ -->
  <g transform="translate(0,390)">
    <text class="label" x="0" y="20">Developer Platform &amp; DevSecOps</text>
    <line x1="0" y1="32" x2="1200" y2="32" stroke="#7454b3" stroke-opacity="0.25" stroke-width="1"/>

    <g transform="translate(0,52)">
      <rect class="pill-bg" x="0"    y="0" rx="5" ry="5" width="158" height="30"/><text class="pill-text" x="14" y="19">GitHub Enterprise</text>
      <rect class="pill-bg" x="168"  y="0" rx="5" ry="5" width="138" height="30"/><text class="pill-text" x="182" y="19">GitHub Copilot</text>
      <rect class="pill-bg" x="316"  y="0" rx="5" ry="5" width="210" height="30"/><text class="pill-text" x="330" y="19">GitHub Advanced Security</text>
      <rect class="pill-bg" x="536"  y="0" rx="5" ry="5" width="138" height="30"/><text class="pill-text" x="550" y="19">GitHub Actions</text>
      <rect class="pill-bg" x="684"  y="0" rx="5" ry="5" width="128" height="30"/><text class="pill-text" x="698" y="19">Azure DevOps</text>
      <rect class="pill-bg" x="822"  y="0" rx="5" ry="5" width="58"  height="30"/><text class="pill-text" x="836" y="19">Bicep</text>
      <rect class="pill-bg" x="890"  y="0" rx="5" ry="5" width="96"  height="30"/><text class="pill-text" x="904" y="19">Terraform</text>
