    <line x1="0" y1="32" x2="1200" y2="32" stroke="#7454b3" stroke-opacity="0.25" stroke-width="1"/>

    <g transform="translate(0,52)">
      <rect class="pill-bg" x="0"    y="0" rx="5" ry="5" width="64"  height="30"/><text class="pill-text" x="14" y="19">Azure</text>
      <rect class="pill-bg" x="74"   y="0" rx="5" ry="5" width="144" height="30"/><text class="pill-text" x="88" y="19">Microsoft Fabric</text>
      <rect class="pill-bg" x="228"  y="0" rx="5" ry="5" width="78"  height="30"/><text class="pill-text" x="242" y="19">Purview</text>
      <rect class="pill-bg" x="316"  y="0" rx="5" ry="5" width="138" height="30"/><text class="pill-text" x="330" y="19">Power Platform</text>
      <rect class="pill-bg" x="464"  y="0" rx="5" ry="5" width="92"  height="30"/><text class="pill-text" x="478" y="19">Power BI</text>
      <rect class="pill-bg" x="566"  y="0" rx="5" ry="5" width="118" height="30"/><text class="pill-text" x="580" y="19">Dynamics 365</text>
      <rect class="pill-bg" x="694"  y="0" rx="5" ry="5" width="86"  height="30"/><text class="pill-text" x="708" y="19">Entra ID</text>
      <rect class="pill-bg" x="790"  y="0" rx="5" ry="5" width="90"  height="30"/><text class="pill-text" x="804" y="19">Defender</text>
      <rect class="pill-bg" x="890"  y="0" rx="5" ry="5" width="84"  height="30"/><text class="pill-text" x="904" y="19">PySpark</text>
      <rect class="pill-bg" x="984"  y="0" rx="5" ry="5" width="96"  height="30"/><text class="pill-text" x="998" y="19">Delta Lake</text>
