<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 560" role="img" aria-label="Tech stack — Languages, Microsoft Cloud & Data, AI & Agentic Systems, Developer Platform & DevSecOps">
  <defs>
    <linearGradient id="pillBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1a1530"/>
      <stop offset="100%" stop-color="#120d22"/>
    </linearGradient>
    <linearGradient id="pillBgLight" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f3f0fa"/>
      <stop offset="100%" stop-color="#e8e3f5"/>
    </linearGradient>
    <style><![CDATA[
      .label { font-family: 'Mona Sans', 'DM Sans', -apple-system, system-ui, sans-serif; font-weight: 700; font-size: 16px; letter-spacing: -0.2px; fill: #e6edf3; }
      .pill-text { font-family: 'JetBrains Mono', ui-monospace, Menlo, Consolas, monospace; font-size: 12px; font-weight: 500; fill: #d8cfef; }
      .pill-bg { fill: url(#pillBg); stroke: #7454b3; stroke-width: 1; stroke-opacity: 0.35; }
      @media (prefers-color-scheme: light) {
        .label { fill: #0b0c10; }
        .pill-text { fill: #271d3b; }
        .pill-bg { fill: url(#pillBgLight); stroke: #7454b3; stroke-opacity: 0.45; }
      }
    ]]></style>
  </defs>

  <!-- ============ Languages ============ -->
  <g transform="translate(0,0)">
    <text class="label" x="0" y="20">Languages</text>
    <line x1="0" y1="32" x2="1200" y2="32" stroke="#7454b3" stroke-opacity="0.25" stroke-width="1"/>

    <g transform="translate(0,52)">
      <rect class="pill-bg" x="0"    y="0" rx="5" ry="5" width="108" height="30"/><text class="pill-text" x="14" y="19">TypeScript</text>
      <rect class="pill-bg" x="118"  y="0" rx="5" ry="5" width="76"  height="30"/><text class="pill-text" x="132" y="19">Python</text>
      <rect class="pill-bg" x="204"  y="0" rx="5" ry="5" width="96"  height="30"/><text class="pill-text" x="218" y="19">C# / .NET</text>
      <rect class="pill-bg" x="310"  y="0" rx="5" ry="5" width="104" height="30"/><text class="pill-text" x="324" y="19">PowerShell</text>
      <rect class="pill-bg" x="424"  y="0" rx="5" ry="5" width="96"  height="30"/><text class="pill-text" x="438" y="19">SQL / KQL</text>
      <rect class="pill-bg" x="530"  y="0" rx="5" ry="5" width="56"  height="30"/><text class="pill-text" x="544" y="19">Dart</text>
    </g>
  </g>

  <!-- ============ Microsoft Cloud & Data ============ -->
